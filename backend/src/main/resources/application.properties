spring.application.name=backend

# =============================
# DATABASE
# =============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.keepalive-time=15000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =============================
# SERVER
# =============================
server.port=8081

# =============================
# GEMINI
# =============================
gemini.api.key=${GEMINI_API_KEY}

# =============================
# JWT
# =============================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# =============================
# UPLOAD FILE
# =============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
spring.servlet.multipart.file-size-threshold=2KB
app.upload.dir=uploads/tasks

# =============================
# BREVO SMTP
# =============================
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.mail.from=${MAIL_FROM}
app.mail.frontend-url=${FRONTEND_URL}

# Ambang batas notifikasi (dalam jam sebelum deadline)
app.notification.deadline-reminder-hours=24

# =============================
# FONNTE
# =============================
fonnte.token=${FONNTE_TOKEN}

# =============================
# SUPABASE STORAGE
# =============================
supabase.url=${SUPABASE_URL}
supabase.anon-key=${SUPABASE_ANON_KEY}