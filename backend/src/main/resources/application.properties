# Konfigurasi Email (SMTP) untuk notifikasi deadline.
# Default memakai Gmail SMTP. Untuk kirim nyata, isi username (email Gmail)
# dan password (App Password 16 digit dari https://myaccount.google.com/apppasswords).
# Untuk testing tanpa kirim nyata, pakai Mailtrap.io (host=smtp.mailtrap.io).
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=heyjipro@gmail.com
# Password dibaca dari environment variable MAIL_PASSWORD.
# Set di shell: export MAIL_PASSWORD=abcd-efgh-ijkl-mnop
# Default kosong supaya backend tetap start walau env var belum diset
# (email notifikasi otomatis di-skip jika SMTP gagal auth).
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Email pengirim default untuk notifikasi (bisa sama dengan username)
app.mail.from=heyjipro@gmail.com
app.mail.frontend-url=http://localhost:5173

# Ambang batas notifikasi (dalam jam sebelum deadline)
app.notification.deadline-reminder-hours=24